version: '3.8'

services:
  # ============================================================================
  # Identity Hub - JWT Authentication & User Management
  # ============================================================================
  identity_hub:
    build:
      context: ./identity_hub
      dockerfile: Dockerfile
    container_name: identity_hub
    ports:
      - "8001:8001"
    environment:
      - DATABASE_PATH=/data/identity.db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production}
      - SQLALCHEMY_DATABASE_URL=sqlite:////data/identity.db
    volumes:
      - identity_db_data:/data
    networks:
      - fastshop-network
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # Product Hub - Catalog & Inventory Management
  # ============================================================================
  product_hub:
    build:
      context: ./product_hub
      dockerfile: Dockerfile
    container_name: product_hub
    ports:
      - "8002:8002"
    environment:
      - DATABASE_PATH=/data/product.db
      - SQLALCHEMY_DATABASE_URL=sqlite:////data/product.db
    volumes:
      - product_db_data:/data
    networks:
      - fastshop-network
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # Transaction Hub - Cart & Checkout Management
  # ============================================================================
  transaction_hub:
    build:
      context: ./transaction_hub
      dockerfile: Dockerfile
    container_name: transaction_hub
    ports:
      - "8003:8003"
    environment:
      - DATABASE_PATH=/data/transaction.db
      - SQLALCHEMY_DATABASE_URL=sqlite:////data/transaction.db
      - PRODUCT_HUB_URL=http://product_hub:8002
      - IDENTITY_HUB_URL=http://identity_hub:8001
    volumes:
      - transaction_db_data:/data
    networks:
      - fastshop-network
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      product_hub:
        condition: service_healthy

  # ============================================================================
  # Frontend Web Application - React + Vite + TailwindCSS
  # ============================================================================
  frontend_app:
    build:
      context: ./frontend_app
      dockerfile: Dockerfile
      args:
        VITE_API_IDENTITY_URL: http://98.70.33.254:8001
        VITE_API_PRODUCT_URL: http://98.70.33.254:8002
        VITE_API_TRANSACTION_URL: http://98.70.33.254:8003
    container_name: frontend_app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_IDENTITY_URL=http://98.70.33.254:8001
      - VITE_API_PRODUCT_URL=http://98.70.33.254:8002
      - VITE_API_TRANSACTION_URL=http://98.70.33.254:8003
    volumes:
      - frontend_node_modules:/app/node_modules
    networks:
      - fastshop-network
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      identity_hub:
        condition: service_healthy
      product_hub:
        condition: service_healthy
      transaction_hub:
        condition: service_healthy

volumes:
  identity_db_data:
    driver: local
  product_db_data:
    driver: local
  transaction_db_data:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  fastshop-network:
    driver: bridge
